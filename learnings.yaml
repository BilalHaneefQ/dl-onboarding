# Cycle Learnings
#
# Populated by /sdd:complete when a cycle archives.
# Each entry captures an insight surfaced by working through a cycle —
# process, technical, or product — that would be useful to future cycles.
#
# Format:
#   - date: YYYY-MM-DD
#     cycle: "{slug}"
#     insight: "{one-to-three sentence observation}"
#     category: "process" | "technical" | "product"
#
# Keep entries terse and specific. Don't duplicate what's already in the
# spec or the archive — write down what was surprising, what you'd tell
# a teammate in a hallway, what you'd do differently next time.

learnings:
  - date: 2026-05-05
    cycle: calendar-agent
    insight: "gog calendar update --attendees REPLACES all attendees, not adds to them. Always
      omit --attendees entirely on reschedule; use --add-attendee to add without removing.
      Confirmed via dry-run: update patch contains only changed fields."
    category: technical

  - date: 2026-05-05
    cycle: calendar-agent
    insight: "Meet links are generated via --with-meet flag on gog calendar create — there is
      no separate gog meet command. conferenceData is preserved automatically on update with
      no special flag needed."
    category: technical

  - date: 2026-05-05
    cycle: calendar-agent
    insight: "Orchestrator skill files live in the main agent's workspace (~/.openclaw/workspace/skills/)
      and must be deployed there manually — they're not auto-loaded from the project repo.
      Keep project copies in agents/orchestrator/ as the source of truth."
    category: process
