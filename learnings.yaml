# Cycle Learnings
#
# Populated by /sdd:complete when a cycle archives.
# Each entry captures an insight surfaced by working through a cycle —
# process, technical, or product — that would be useful to future cycles.
#
# Format:
#   - date: YYYY-MM-DD
#     cycle: "{slug}"
#     insight: "{one-to-three sentence observation}"
#     category: "process" | "technical" | "product"
#
# Keep entries terse and specific. Don't duplicate what's already in the
# spec or the archive — write down what was surprising, what you'd tell
# a teammate in a hallway, what you'd do differently next time.

learnings:
  - date: 2026-05-06
    cycle: contact-lookup
    insight: "gog people search uses exit code 3 (not 0/empty array) when --fail-empty is set
      and no results are found. Exit 2 = auth/network error. Always handle these separately:
      3 = fall back to asking; 2 = surface error and fall back."
    category: technical

  - date: 2026-05-06
    cycle: user-google-auth
    insight: "gog --remote --step 1/2 does NOT work across separate process invocations — gog
      stores PKCE state in-memory only. Use --manual with a persistent spawned process: step 1
      prints the URL to stderr, then the process waits on stdin for the callback URL."
    category: technical

  - date: 2026-05-06
    cycle: user-google-auth
    insight: "gog --manual prints the OAuth URL to stderr (not stdout), preceded by 'Visit this URL:'
      text. URL extraction requires reading both stdout and stderr and using a regex to find the
      Google OAuth URL, not just reading a clean stdout line."
    category: technical

  - date: 2026-05-06
    cycle: user-google-auth
    insight: "openclaw-multitenant is not available as an npm package. For multi-user agent
      isolation, use gog's native multi-account support (-a flag per command) + manual
      openclaw agents add per user. Per-user container automation is a future problem."
    category: architecture
  - date: 2026-05-05
    cycle: calendar-agent
    insight: "gog calendar update --attendees REPLACES all attendees, not adds to them. Always
      omit --attendees entirely on reschedule; use --add-attendee to add without removing.
      Confirmed via dry-run: update patch contains only changed fields."
    category: technical

  - date: 2026-05-05
    cycle: calendar-agent
    insight: "Meet links are generated via --with-meet flag on gog calendar create — there is
      no separate gog meet command. conferenceData is preserved automatically on update with
      no special flag needed."
    category: technical

  - date: 2026-05-05
    cycle: calendar-agent
    insight: "Orchestrator skill files live in the main agent's workspace (~/.openclaw/workspace/skills/)
      and must be deployed there manually — they're not auto-loaded from the project repo.
      Keep project copies in agents/orchestrator/ as the source of truth."
    category: process
    cycle: email-agent
    insight: "OpenClaw agents.list is an array in openclaw.json, not an object — use
      `openclaw config set --batch-file` to modify it; direct file edits are reverted
      by the daemon. Always use the CLI or batch file approach."
    category: tooling

  - date: 2026-05-05
    cycle: email-agent
    insight: "AGENTS.md is gitignored because OpenClaw auto-generates workspace identity
      files with that name. Version-control agent prompts as prompt.md and copy to
      workspace/AGENTS.md during setup. Add register.json for idempotent re-registration."
    category: process

  - date: 2026-05-05
    cycle: email-agent
    insight: "gog mail has no --list-unread flag — use `gog mail search 'is:unread'`
      with Gmail query syntax. Always verify actual CLI command shapes against --help
      before writing spec-delta; don't assume flag names from documentation."
    category: technical
